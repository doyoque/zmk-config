# OLED + custom status screen (required by zmk-nice-oled)
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_I2C=y
CONFIG_SSD1306=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n

# Keep WPM/HID data available to OLED widgets
CONFIG_ZMK_WPM=y
CONFIG_ZMK_HID_INDICATORS=y

# nice!oled widgets
CONFIG_NICE_OLED_WIDGET_WPM=y
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS=y

# Prefer static gem on peripheral side (lower power, avoids default animation loop)
CONFIG_NICE_OLED_GEM_ANIMATION=n

# LVGL/UI stability
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_PRIORITY=5
CONFIG_LV_Z_MEM_POOL_SIZE=8192

# Corne RGB underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
